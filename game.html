    <style>
        :root {
            --bg-dark: #090d16;
            --accent-glow: rgba(59, 130, 246, 0.15);
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;

            background-image: 
                radial-gradient(circle at 50% 50%, rgba(15, 23, 42, 0.8) 0%, var(--bg-dark) 100%),

            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;

        /* Beautiful Premium Glassmorphism */
        .glass-panel {
            background: rgba(13, 18, 30, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.6);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.25);
            outline: none;
        }
        .ui-layer { pointer-events: none; }
        .interactive { pointer-events: auto; }
        
        .safe-padding {
            padding-top: env(safe-area-inset-top, 16px);
            padding-bottom: env(safe-area-inset-bottom, 16px);
            padding-left: env(safe-area-inset-left, 16px);
            padding-right: env(safe-area-inset-right, 16px);

        /* Custom Animated Grid Background */

            position: absolute;
            inset: 0;

                linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);

    <script>
        // Generate PWA Manifest dynamically to allow standalone full-screen
        const manifestData = {
            name: "Cambodia State Wars Multiplayer",
            short_name: "CamWarsMP",
            start_url: ".",
            display: "standalone",
            background_color: "#090d16",
            theme_color: "#090d16",
            orientation: "landscape"
        };
        const manifestBlob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
        document.getElementById('pwa-manifest').href = URL.createObjectURL(manifestBlob);

        // Core Game Variables
        let canvas = document.getElementById('gameCanvas');
        let ctx = canvas.getContext('2d', { alpha: false });
        let dpr = window.devicePixelRatio || 1;
        
        let width, height;
        let worldWidth = 2000;
        let worldHeight = 1600;
        
        let regions = [];
        let movingTroops = [];
        let delaunay, voronoi;
        
        // Dynamic Camera & Zoom Coordinates
        let camera = { x: 0, y: 0, zoom: 1 };
        let inputState = {
            mode: 'none',
            activeTouches: new Map(),
            lastPan: { x: 0, y: 0 },
            initialPinchDist: 0,
            initialZoom: 1,
            selectedRegion: null,
            dragTarget: null,
            dragCurrentWorldPos: null
        };

        // Multiplayer System State
        let roomCode = null;
        let isHost = false;
        let localPlayerId = null;
        let localNickname = "Commander";
        let localFaction = "player"; // player (Blue), ai1 (Red), ai2 (Green), ai3 (Yellow), ai4 (Purple)
        let roomData = null;
        let unsubscribeRoom = null;
        let gameActive = false;
        let spawnedAttackIds = new Set();
        let lastSyncTime = 0;
        
        // Web Audio Synthesizer (Premium Audio without external URL)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                if (type === 'click') {
                    osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.1);
                } else if (type === 'spawn') {
                    osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(450, audioCtx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.15);
                } else if (type === 'conquer') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(220, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.35);
                }
            } catch (e) {
                console.warn("Audio Context blocked or failed.", e);
            }
        }

        // Configuration
        const config = {
            maxTroops: 120,
            productionRate: 1500, // Sync loop intervals
            troopSpeed: 190,
            troopSize: 5.5,
            colors: {
                neutral: { fill: ['#334155', '#1e293b'], stroke: '#475569', text: '#f8fafc', shadow: '#0f172a', troop: '#64748b' },
                player:  { fill: ['#2563eb', '#1e40af'], stroke: '#3b82f6', text: '#ffffff', shadow: '#172554', troop: '#93c5fd' }, // Blue
                ai1:     { fill: ['#dc2626', '#991b1b'], stroke: '#ef4444', text: '#ffffff', shadow: '#450a0a', troop: '#fca5a5' }, // Red
                ai2:     { fill: ['#16a34a', '#166534'], stroke: '#22c55e', text: '#ffffff', shadow: '#052e16', troop: '#86efac' }, // Green
                ai3:     { fill: ['#d97706', '#92400e'], stroke: '#f59e0b', text: '#ffffff', shadow: '#451a03', troop: '#fde047' }, // Yellow
                ai4:     { fill: ['#7c3aed', '#5b21b6'], stroke: '#8b5cf6', text: '#ffffff', shadow: '#2e1065', troop: '#c4b5fd' }  // Purple
            }
        };

        const factions = ['neutral', 'player', 'ai1', 'ai2', 'ai3', 'ai4'];

        // Layout representation of Cambodian Provinces
        const cambodiaLayout = [
            { id: 'OM', x: 0.40, y: 0.20 }, // Oddar Meanchey
            { id: 'PV', x: 0.55, y: 0.20 }, // Preah Vihear
            { id: 'BM', x: 0.25, y: 0.30 }, // Banteay Meanchey
            { id: 'SR', x: 0.40, y: 0.35 }, // Siem Reap
            { id: 'BT', x: 0.20, y: 0.45 }, // Battambang
            { id: 'PL', x: 0.15, y: 0.55 }, // Pailin
            { id: 'PS', x: 0.30, y: 0.55 }, // Pursat
            { id: 'KK', x: 0.28, y: 0.75 }, // Koh Kong
            { id: 'SH', x: 0.35, y: 0.88 }, // Sihanoukville
            { id: 'KP', x: 0.45, y: 0.85 }, // Kampot
            { id: 'KE', x: 0.48, y: 0.90 }, // Kep
            { id: 'TK', x: 0.55, y: 0.80 }, // Takeo
            { id: 'KT', x: 0.55, y: 0.45 }, // Kampong Thom
            { id: 'KC', x: 0.45, y: 0.55 }, // Kampong Chhnang
            { id: 'KS', x: 0.45, y: 0.68 }, // Kampong Speu
            { id: 'KD', x: 0.60, y: 0.70 }, // Kandal
            { id: 'PP', x: 0.60, y: 0.64 }, // Phnom Penh
            { id: 'KCH',x: 0.65, y: 0.55 }, // Kampong Cham
            { id: 'TB', x: 0.75, y: 0.55 }, // Tboung Khmum
            { id: 'PR', x: 0.70, y: 0.70 }, // Prey Veng
            { id: 'SV', x: 0.80, y: 0.78 }, // Svay Rieng
            { id: 'KR', x: 0.75, y: 0.40 }, // Kratie
            { id: 'ST', x: 0.70, y: 0.25 }, // Stung Treng
            { id: 'RT', x: 0.85, y: 0.25 }, // Ratanakiri
            { id: 'MK', x: 0.85, y: 0.45 }  // Mondulkiri
        ];

        // Auth initialization and state tracking
        window.addEventListener('firebaseReady', async () => {
            const status = document.getElementById('connectionStatus');
            try {
                // RULE 3 - Custom auth token preferred, else fallback to anonymous
                let cred;
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    cred = await window.fbImports.signInWithCustomToken(window.auth, __initial_auth_token);
                } else {
                    cred = await window.fbImports.signInAnonymously(window.auth);
                }
                localPlayerId = cred.user.uid;
                status.innerText = "System online. Secure connection established.";
                status.className = "mt-6 text-xs font-semibold text-emerald-500";
                
                // Set initial random nickname to fill empty inputs
                const randomId = Math.floor(1000 + Math.random() * 9000);
                document.getElementById('nicknameInput').value = `General_${randomId}`;
            } catch (err) {
                console.error("Authentication Error: ", err);
                status.innerText = "Connection failure. Reconnecting...";
                status.className = "mt-6 text-xs font-semibold text-red-500";
            }
        });

        function setupCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            canvas.width = width * dpr;
            canvas.height = height * dpr;
        }

        window.addEventListener('resize', () => {
            setupCanvas();
            if (regions.length > 0) centerCamera();
        });

        setupCanvas();

        // Fit Map beautifully inside view bounds
        function centerCamera() {
            if (regions.length === 0) return;
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            regions.forEach(r => {
                r.polygon.forEach(p => {
                    if (p[0] < minX) minX = p[0];
                    if (p[0] > maxX) maxX = p[0];
                    if (p[1] < minY) minY = p[1];
                    if (p[1] > maxY) maxY = p[1];
                });
            });
            
            let mapW = maxX - minX;
            let mapH = maxY - minY;
            let mapCX = minX + mapW/2;
            let mapCY = minY + mapH/2;

            let zoomX = width / (mapW * 1.2);
            let zoomY = height / (mapH * 1.2);
            camera.zoom = Math.max(0.3, Math.min(2.2, Math.min(zoomX, zoomY)));
            
            camera.x = (width / 2) - (mapCX * camera.zoom);
            camera.y = (height / 2) - (mapCY * camera.zoom);
        }

        function screenToWorld(x, y) {
            return {
                x: (x - camera.x) / camera.zoom,
                y: (y - camera.y) / camera.zoom
            };
        }

        // Fast centroid & polygon hit checks
        function getRegionAtScreen(x, y) {
            const world = screenToWorld(x, y);
            for (let r of regions) {
                if (d3.polygonContains(r.polygon, [world.x, world.y])) {
                    return r;
                }
            }
            return null;
        }

        function buildMapSkeleton() {
            regions = [];
            
            // Generate land province layout coordinates
            let landPoints = cambodiaLayout.map(p => {
                return {
                    id: p.id,
                    x: p.x * worldWidth,
                    y: p.y * worldHeight,
                    isLand: true
                };
            });

            // Formulate offshore boundary islands representing coast boundaries to clip ocean
            let waterPoints = [];
            let center = { x: 0.5 * worldWidth, y: 0.5 * worldHeight };
            for (let r = 0.63; r <= 1.25; r += 0.2) {
                let numPts = Math.floor(r * 32);
                for (let i = 0; i < numPts; i++) {
                    let angle = (i / numPts) * Math.PI * 2;
                    waterPoints.push({
                        id: `water_${r}_${i}`,
                        x: center.x + Math.cos(angle) * (worldWidth * r * 0.6),
                        y: center.y + Math.sin(angle) * (worldHeight * r * 0.5),
                        isLand: false
                    });
                }
            }

            let allPoints = [...landPoints, ...waterPoints];
            let coords = allPoints.map(p => [p.x, p.y]);

            // Voronoi Mesh construction
            delaunay = d3.Delaunay.from(coords);
            voronoi = delaunay.voronoi([-worldWidth, -worldHeight, worldWidth*2, worldHeight*2]);

            // Create beautiful clipped land shapes
            let logicalIndex = 0;
            for (let i = 0; i < allPoints.length; i++) {
                if (!allPoints[i].isLand) continue;

                const polygon = voronoi.cellPolygon(i);
                if (!polygon) continue;

                const centroid = d3.polygonCentroid(polygon);
                const area = Math.abs(d3.polygonArea(polygon));
                
                // Slight organic contraction creates beautiful rivers and channel spaces
                const shrinkFactor = 0.92;
                const shrunkPolygon = polygon.map(p => [
                    centroid[0] + (p[0] - centroid[0]) * shrinkFactor,
                    centroid[1] + (p[1] - centroid[1]) * shrinkFactor
                ]);

                const capacity = Math.max(30, Math.min(config.maxTroops, Math.floor(area / 1250)));

                regions.push({
                    id: allPoints[i].id,
                    index: logicalIndex++,
                    x: centroid[0],
                    y: centroid[1],
                    polygon: shrunkPolygon,
                    owner: 'neutral',
                    troops: 20,
                    capacity: capacity,
                    dispatchQueue: [],
                    radius: Math.sqrt(area/Math.PI) * 0.7
                });
            }
        }

        function getPinchDist(t1, t2) {
            return Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
        }
        function getPinchCenter(t1, t2) {
            return { x: (t1.clientX + t2.clientX)/2, y: (t1.clientY + t2.clientY)/2 };
        }

        function handleInputStart(e) {
            if (!gameActive) return;
            
            // Ignore events interacting directly with standard HUD/Modal elements
            if (e.target.closest('.interactive')) return;
            e.preventDefault();

            if (e.touches) {
                for (let i=0; i<e.touches.length; i++) {
                    inputState.activeTouches.set(e.touches[i].identifier, e.touches[i]);
                }
            }

            let touches = e.touches ? Array.from(e.touches) : [e];
            
            if (touches.length === 2) {
                inputState.mode = 'zoom';
                inputState.initialPinchDist = getPinchDist(touches[0], touches[1]);
                inputState.initialZoom = camera.zoom;
                inputState.selectedRegion = null;
            } else if (touches.length === 1) {
                let t = touches[0];
                let clickedReg = getRegionAtScreen(t.clientX, t.clientY);
                
                // Make sure player only attacks using their assigned faction!
                if (clickedReg && clickedReg.owner === localFaction) {
                    inputState.mode = 'attack';
                    inputState.selectedRegion = clickedReg;
                    inputState.dragCurrentWorldPos = screenToWorld(t.clientX, t.clientY);
                    playSound('click');
                } else {
                    inputState.mode = 'pan';
                    inputState.lastPan = { x: t.clientX, y: t.clientY };
                }
            }
        }

        function handleInputMove(e) {
            if (!gameActive) return;
            e.preventDefault();

            if (e.touches) {
                for (let i=0; i<e.touches.length; i++) {
                    inputState.activeTouches.set(e.touches[i].identifier, e.touches[i]);
                }
            }
            let touches = e.touches ? Array.from(e.touches) : [e];

            if (inputState.mode === 'zoom' && touches.length === 2) {
                let currentDist = getPinchDist(touches[0], touches[1]);
                let center = getPinchCenter(touches[0], touches[1]);
                let scaleFactor = currentDist / inputState.initialPinchDist;
                
                let newZoom = Math.max(0.3, Math.min(2.5, inputState.initialZoom * scaleFactor));
                let worldCenter = screenToWorld(center.x, center.y);
                camera.zoom = newZoom;
                camera.x = center.x - worldCenter.x * camera.zoom;
                camera.y = center.y - worldCenter.y * camera.zoom;
            } else if (inputState.mode === 'pan' && touches.length === 1) {
                let t = touches[0];
                camera.x += (t.clientX - inputState.lastPan.x);
                camera.y += (t.clientY - inputState.lastPan.y);
                inputState.lastPan = { x: t.clientX, y: t.clientY };
            } else if (inputState.mode === 'attack' && touches.length === 1) {
                let t = touches[0];
                inputState.dragCurrentWorldPos = screenToWorld(t.clientX, t.clientY);
                inputState.dragTarget = getRegionAtScreen(t.clientX, t.clientY);
            }
        }

        function handleInputEnd(e) {
            if (!gameActive) return;
            if (e.changedTouches) {
                for (let i=0; i<e.changedTouches.length; i++) {
                    inputState.activeTouches.delete(e.changedTouches[i].identifier);
                }
            }

            let remain = inputState.activeTouches.size;
            
            if (inputState.mode === 'attack') {
                if (inputState.selectedRegion && inputState.dragTarget && inputState.selectedRegion.id !== inputState.dragTarget.id) {
                    executeAttack(inputState.selectedRegion, inputState.dragTarget);
                }
            }

            if (remain === 0) {
                inputState.mode = 'none';
                inputState.selectedRegion = null;
                inputState.dragTarget = null;
            } else if (remain === 1) {
                inputState.mode = 'pan';
                let t = Array.from(inputState.activeTouches.values())[0];
                inputState.lastPan = { x: t.clientX, y: t.clientY };
            }
        }

        // Mouse Wheel compatibility
        canvas.addEventListener('wheel', (e) => {
            if (!gameActive) return;
            e.preventDefault();
            let zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
            let newZoom = Math.max(0.3, Math.min(2.5, camera.zoom * zoomFactor));
            let worldPos = screenToWorld(e.clientX, e.clientY);
            camera.zoom = newZoom;
            camera.x = e.clientX - worldPos.x * camera.zoom;
            camera.y = e.clientY - worldPos.y * camera.zoom;
        }, {passive: false});

        canvas.addEventListener('mousedown', handleInputStart);
        window.addEventListener('mousemove', handleInputMove);
        window.addEventListener('mouseup', handleInputEnd);
        canvas.addEventListener('touchstart', handleInputStart, {passive: false});
        canvas.addEventListener('touchmove', handleInputMove, {passive: false});
        window.addEventListener('touchend', handleInputEnd);

        // Setup Firestore Room Sync
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'state-wars-v1';

        async function createRoom() {
            if (!window.db || !localPlayerId) return;
            playSound('click');
            
            const code = Math.floor(1000 + Math.random() * 9000).toString();
            roomCode = code;
            isHost = true;

            localNickname = document.getElementById('nicknameInput').value.trim() || "Host";

            buildMapSkeleton();
            const regionsData = regions.map(r => {

                else if (r.id === 'RT') { owner = 'ai1'; troops = 50; }
                else if (r.id === 'OM') { owner = 'ai2'; troops = 50; }
                else if (r.id === 'KK') { owner = 'ai3'; troops = 50; }
                else if (r.id === 'SV') { owner = 'ai4'; troops = 50; }

            });

                        faction: 'player',

        async function joinRoom() {
            if (!window.db || !localPlayerId) return;
            playSound('click');
            
            const code = document.getElementById('roomCodeInput').value.trim();
            if (code.length !== 4) return;

            localNickname = document.getElementById('nicknameInput').value.trim() || "Infiltrator";

            const docRef = window.fbImports.doc(window.db, 'artifacts', appId, 'public', 'data', 'rooms', code);
            const docSnap = await window.fbImports.getDoc(docRef);

            if (!docSnap.exists()) {
                alert("Campaign / Room code not found.");
                return;
            }

            const rData = docSnap.data();
            if (rData.state !== 'waiting') {
                alert("Campaign battle already underway.");
                return;
            }

            const pCount = Object.keys(rData.players).length;
            if (pCount >= 5) {
                alert("Campaign room is full.");
                return;
            }

            // Allocate vacant faction
            const allocatedFactions = Object.values(rData.players).map(p => p.faction);
            let targetFaction = 'ai1';
            for (let f of ['ai1', 'ai2', 'ai3', 'ai4']) {
                if (!allocatedFactions.includes(f)) {
                    targetFaction = f;
                    break;
                }
            }
            localFaction = targetFaction;
            isHost = false;

            const updateData = {};
            updateData[`players.${localPlayerId}`] = {
                name: localNickname,
                faction: localFaction,
                active: true
            };
            updateData.lastUpdated = Date.now();

            await window.fbImports.updateDoc(docRef, updateData);
            roomCode = code;
            enterLobby(code);
        }

        function enterLobby(code) {
            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById('lobbyScreen').classList.replace('hidden', 'flex');

            if (isHost) {

                document.getElementById('waitStartMsg').classList.add('hidden');
            } else {
                document.getElementById('startGameBtn').classList.add('hidden');
                document.getElementById('waitStartMsg').classList.remove('hidden');
            }

            // Realtime Room Hookup
            const docRef = window.fbImports.doc(window.db, 'artifacts', appId, 'public', 'data', 'rooms', code);
            
            unsubscribeRoom = window.fbImports.onSnapshot(docRef, (docSnap) => {
                if (!docSnap.exists()) return;
                const data = docSnap.data();
                roomData = data;
                
                updateLobbyUI(data);

                if (data.state === 'playing' && !gameActive) {
                    launchCampaign(data);
                }
                
                // Realtime synchronization of tactical swarms
                if (gameActive && data.attacks) {
                    syncIncomingAttacks(data.attacks);
                }
            }, (err) => {
                console.error("Room sync disconnected: ", err);
            });
        }

            if (unsubscribeRoom) unsubscribeRoom();
            
            if (roomCode) {

        async function triggerStartGame() {
            playSound('conquer');
            if (!isHost || !roomCode) return;
            const docRef = window.fbImports.doc(window.db, 'artifacts', appId, 'public', 'data', 'rooms', roomCode);
            await window.fbImports.updateDoc(docRef, {
                state: 'playing',
                lastUpdated: Date.now()
            });
        }

        function launchCampaign(data) {
            gameActive = true;
            document.getElementById('lobbyScreen').classList.replace('flex', 'hidden');
            document.getElementById('gameHUD').classList.remove('hidden');
            
            // HUD Customizations
            document.getElementById('hudPlayerName').innerText = localNickname;
            const factionMapColors = {
                player: 'bg-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.5)]',
                ai1: 'bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.5)]',
                ai2: 'bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)]',
                ai3: 'bg-amber-500 shadow-[0_0_10px_rgba(245,158,11,0.5)]',
                ai4: 'bg-purple-500 shadow-[0_0_10px_rgba(139,92,246,0.5)]'
            };
            document.getElementById('playerColorIndicator').className = `w-3.5 h-3.5 rounded-full ${factionMapColors[localFaction]}`;

            // Initialize local coordinate space from skeleton build
            buildMapSkeleton();
            
            // Reconcile region status
            data.regions.forEach(syncR => {
                let localR = regions.find(r => r.id === syncR.id);
                if (localR) {
                    localR.owner = syncR.owner;
                    localR.troops = syncR.troops;
                }
            });

            centerCamera();
        }

        function executeAttack(source, target) {
            const sendQty = Math.floor(source.troops / 2);
            if (sendQty <= 0) return;

            // Instantly update local counts for snappy responsiveness
            source.troops -= sendQty;
            playSound('spawn');

            // Formulate multiplayer command packet
            const attackId = `${localPlayerId}_${Date.now()}_${Math.floor(Math.random()*1000)}`;
            const action = {
                id: attackId,
                from: source.id,
                to: target.id,
                qty: sendQty,
                faction: localFaction,
                time: Date.now()
            };

            // Local forecast spawn directly
            spawnedAttackIds.add(attackId);
            spawnTroopVisuals(source, target, sendQty, localFaction);

            // Send action coordinates to the global strategic board
            if (roomCode) {
                const docRef = window.fbImports.doc(window.db, 'artifacts', appId, 'public', 'data', 'rooms', roomCode);
                const updatedAttacks = [...(roomData?.attacks || [])].slice(-25); // Limit active state array elements
                updatedAttacks.push(action);
                
                // RULE 2 - Minimal payload structure updates
                window.fbImports.updateDoc(docRef, {
                    attacks: updatedAttacks,
                    lastUpdated: Date.now()
                });
            }
        }

        // Parse visual commands from other participants
        function syncIncomingAttacks(attacksList) {
            attacksList.forEach(att => {
                if (spawnedAttackIds.has(att.id)) return; // Ignored if spawned locally
                spawnedAttackIds.add(att.id);

                let source = regions.find(r => r.id === att.from);
                let target = regions.find(r => r.id === att.to);
                if (source && target) {
                    // Update source simulation
                    if (source.owner === att.faction) {
                        source.troops = Math.max(0, source.troops - att.qty);
                    }
                    spawnTroopVisuals(source, target, att.qty, att.faction);
                }
            });
        }

        function spawnTroopVisuals(source, target, count, faction) {
            const task = {
                targetIndex: target.index,
                amountRemaining: count,
                owner: faction
            };
            source.dispatchQueue.push(task);
        }

        function update(dt, time) {
            if (!gameActive) return;
            let dtSec = dt / 1000;

            // 1. Dispatch & Visual Swarm Updates
            regions.forEach(r => {
                if (r.dispatchQueue.length > 0) {
                    const task = r.dispatchQueue[0];
                    if (task.amountRemaining > 0) {
                        task.amountRemaining--;
                        
                        // Spawn visuals radiating organically from centroid
                        const angle = Math.random() * Math.PI * 2;
                        const dist = Math.random() * (r.radius * 0.4);
                        
                        movingTroops.push({
                            x: r.x + Math.cos(angle) * dist,
                            y: r.y + Math.sin(angle) * dist,
                            targetIndex: task.targetIndex,
                            owner: task.owner,
                            angle: 0
                        });
                    }
                    if (task.amountRemaining <= 0) r.dispatchQueue.shift();
                }
            });

            // 2. Troop Physics and Pathfinding Update
            for (let i = movingTroops.length - 1; i >= 0; i--) {
                let troop = movingTroops[i];
                let targetReg = regions[troop.targetIndex];
                
                let dx = targetReg.x - troop.x;
                let dy = targetReg.y - troop.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                
                troop.angle = Math.atan2(dy, dx);

                // Organic flight pathing
                let noiseX = Math.sin(time / 180 + troop.x) * 22;
                let noiseY = Math.cos(time / 180 + troop.y) * 22;

                if (dist < targetReg.radius * 0.7) {
                    movingTroops.splice(i, 1);
                    
                    if (targetReg.owner === troop.owner) {
                        if (targetReg.troops < targetReg.capacity * 2) targetReg.troops++;
                    } else {
                        targetReg.troops--;
                        if (targetReg.troops < 0) {
                            targetReg.owner = troop.owner;
                            targetReg.troops = 1;
                            targetReg.dispatchQueue = [];
                            playSound('conquer');
                        }
                    }
                } else {
                    let speed = config.troopSpeed * dtSec;
                    troop.x += (dx / dist) * speed + (noiseX * dtSec);
                    troop.y += (dy / dist) * speed + (noiseY * dtSec);
                }
            }

            // 3. AI Controller (Triggered only on the Host client for sync consistency)
            if (isHost && roomData) {
                // Determine vacant slots currently run as active local bots
                const activePlayerFactions = Object.values(roomData.players).map(p => p.faction);
                const botFactions = ['ai1', 'ai2', 'ai3', 'ai4'].filter(f => !activePlayerFactions.includes(f));

                regions.forEach(r => {
                    if (botFactions.includes(r.owner)) {
                        if (Math.random() < 0.006) {
                            if (r.troops > r.capacity * 0.55 && r.dispatchQueue.length === 0) {
                                let targets = regions.filter(t => t.id !== r.id);
                                targets.sort((a, b) => {
                                    let distA = Math.hypot(a.x - r.x, a.y - r.y);
                                    let distB = Math.hypot(b.x - r.x, b.y - r.y);
                                    let scoreA = distA + (a.owner === r.owner ? 6000 : (a.owner === 'neutral' ? a.troops * 4 : a.troops * 12));
                                    let scoreB = distB + (b.owner === r.owner ? 6000 : (b.owner === 'neutral' ? b.troops * 4 : b.troops * 12));
                                    return scoreA - scoreB;
                                });

                                if (targets.length > 0 && targets[0].owner !== r.owner) {
                                    // Host triggers attack sequence and broadcasts to state database
                                    executeAttack(r, targets[0]);
                                }
                            }
                        }
                    }
                });
            }

            // 4. Strategic Synchronization / Host Verification Authority Loop
            if (time - lastSyncTime > config.productionRate) {
                lastSyncTime = time;
                if (isHost && roomCode) {
                    // Update state variables (production increment, etc.)
                    regions.forEach(r => {
                        if (r.owner !== 'neutral' && r.troops < r.capacity) {
                            r.troops++;
                        }
                    });

                    // Push absolute coordinates / states up to Firestore to sync clients
                    const rDataRef = window.fbImports.doc(window.db, 'artifacts', appId, 'public', 'data', 'rooms', roomCode);
                    const syncRegions = regions.map(r => ({ id: r.id, owner: r.owner, troops: r.troops }));
                    window.fbImports.updateDoc(rDataRef, {
                        regions: syncRegions,
                        lastUpdated: Date.now()
                    });
                } else if (roomData && roomData.regions) {
                    // Client Interpolator
                    roomData.regions.forEach(syncR => {
                        let localR = regions.find(r => r.id === syncR.id);
                        if (localR) {
                            // Reconcile and snap states to target values if difference gets high
                            if (Math.abs(localR.troops - syncR.troops) > 6 || localR.owner !== syncR.owner) {
                                localR.owner = syncR.owner;
                                localR.troops = syncR.troops;
                            } else {
                                // Smooth recovery interpolate
                                localR.troops = Math.round(localR.troops * 0.8 + syncR.troops * 0.2);
                            }
                        }
                    });
                }
                
                // Keep HUD Bars Synchronized
                recalculateHUDMetrics();
            }

            checkWinLoseStatus();
        }

        function recalculateHUDMetrics() {
            let totals = { player: 0, ai1: 0, ai2: 0, ai3: 0, ai4: 0, neutral: 0 };
            regions.forEach(r => {
                if (totals[r.owner] !== undefined) totals[r.owner]++;
            });
            
            const totalCount = regions.length || 1;
            document.getElementById('bar-player').style.width = `${(totals.player / totalCount) * 100}%`;
            document.getElementById('bar-ai1').style.width = `${(totals.ai1 / totalCount) * 100}%`;
            document.getElementById('bar-ai2').style.width = `${(totals.ai2 / totalCount) * 100}%`;
            document.getElementById('bar-ai3').style.width = `${(totals.ai3 / totalCount) * 100}%`;
            document.getElementById('bar-ai4').style.width = `${(totals.ai4 / totalCount) * 100}%`;
            document.getElementById('bar-neutral').style.width = `${(totals.neutral / totalCount) * 100}%`;
        }

        function checkWinLoseStatus() {
            let activeFactions = new Set();
            regions.forEach(r => {
                if (r.owner !== 'neutral') activeFactions.add(r.owner);
            });
            movingTroops.forEach(t => {
                activeFactions.add(t.owner);
            });

            if (activeFactions.size > 0) {
                if (!activeFactions.has(localFaction)) {
                    triggerCampaignEnd(false);
                } else if (activeFactions.size === 1 && activeFactions.has(localFaction)) {
                    triggerCampaignEnd(true);
                }
            }
        }

        function triggerCampaignEnd(victory) {
            gameActive = false;
            document.getElementById('gameHUD').classList.add('hidden');
            
            const screen = document.getElementById('endGameScreen');
            const modal = document.getElementById('endGameModal');
            const title = document.getElementById('endGameTitle');
            const sub = document.getElementById('endGameSub');

            screen.classList.replace('hidden', 'flex');
            setTimeout(() => modal.classList.replace('scale-95', 'scale-100'), 50);

            if (victory) {
                title.innerText = "VICTORY";
                title.className = "text-5xl font-black text-transparent bg-clip-text bg-gradient-to-br from-green-300 to-emerald-500 mb-2 tracking-wider";
                sub.innerText = "You successfully unified the provinces of Cambodia.";
            } else {
                title.innerText = "DEFEAT";
                title.className = "text-5xl font-black text-transparent bg-clip-text bg-gradient-to-br from-red-400 to-rose-600 mb-2 tracking-wider";
                sub.innerText = "Your strategic forces were out-maneuvered.";
            }
        }

        function drawPolygon(polygon) {
            ctx.beginPath();
            ctx.moveTo(polygon[0][0], polygon[0][1]);
            for (let i = 1; i < polygon.length; i++) {
                ctx.lineTo(polygon[i][0], polygon[i][1]);
            }
            ctx.closePath();
        }

        function draw() {
            // Background Clearing
            ctx.fillStyle = '#090d16';
            ctx.fillRect(0, 0, width*dpr, height*dpr);

            ctx.save();
            ctx.scale(dpr, dpr);
            
            // Apply Dynamic Camera Transformations
            ctx.translate(camera.x, camera.y);
            ctx.scale(camera.zoom, camera.zoom);

            // 1. Draw Land Provinces (Voronoi Polygons)
            regions.forEach(r => {
                const colors = config.colors[r.owner];
                drawPolygon(r.polygon);
                
                // Fluid Linear Gradients representing terrain depth
                let minY = Math.min(...r.polygon.map(p=>p[1]));
                let maxY = Math.max(...r.polygon.map(p=>p[1]));
                let grad = ctx.createLinearGradient(0, minY, 0, maxY);
                grad.addColorStop(0, colors.fill[0]);
                grad.addColorStop(1, colors.fill[1]);
                
                // Territory Outer Shadows
                ctx.shadowColor = 'rgba(0,0,0,0.4)';
                ctx.shadowBlur = 12;
                ctx.shadowOffsetY = 4;
                
                ctx.fillStyle = grad;
                ctx.fill();
                
                ctx.shadowColor = 'transparent'; // Reset
                
                // Dynamic border highlighting for selection cues
                if (r === inputState.selectedRegion) {
                    ctx.lineWidth = 5;
                    ctx.strokeStyle = '#ffffff';
                    ctx.stroke();
                } else if (r === inputState.dragTarget) {
                    ctx.lineWidth = 4;
                    ctx.strokeStyle = '#fde047';
                    ctx.setLineDash([8, 8]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                } else {
                    ctx.lineWidth = 2.5;
                    ctx.strokeStyle = colors.stroke;
                    ctx.stroke();
                }
            });

            // 2. Draw Troop Values & Rounded Containers
            regions.forEach(r => {
                const colors = config.colors[r.owner];
                
                ctx.fillStyle = colors.shadow;
                ctx.beginPath();
                ctx.roundRect(r.x - 22, r.y - 14, 44, 28, 14);
                ctx.fill();

                ctx.fillStyle = colors.text;
                ctx.font = 'bold 16px "Poppins", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(r.troops, r.x, r.y + 1);
            });

            // 3. Draw Troop Units (Custom Jet Visualizers)
            movingTroops.forEach(t => {
                const colors = config.colors[t.owner];
                const size = config.troopSize;
                
                ctx.save();
                ctx.translate(t.x, t.y);
                ctx.rotate(t.angle);
                
                ctx.beginPath();
                ctx.moveTo(size * 1.8, 0);       // Nose
                ctx.lineTo(-size, size);         // Right wing
                ctx.lineTo(-size/2, 0);          // Tail
                ctx.lineTo(-size, -size);        // Left wing
                ctx.closePath();

                // Custom unit neon trails
                ctx.shadowColor = colors.troop;
                ctx.shadowBlur = 6;

                ctx.fillStyle = '#ffffff';
                ctx.fill();
                
                ctx.lineWidth = 1.8;
                ctx.strokeStyle = colors.fill[0];
                ctx.stroke();

                ctx.restore();
            });

            // 4. Draw Command Line Path indicators
            if (inputState.mode === 'attack' && inputState.selectedRegion && inputState.dragCurrentWorldPos) {
                const start = inputState.selectedRegion;
                const end = inputState.dragCurrentWorldPos;
                
                ctx.beginPath();
                ctx.moveTo(start.x, start.y);
                
                let midX = (start.x + end.x)/2;
                let midY = (start.y + end.y)/2 - 40; 
                ctx.quadraticCurveTo(midX, midY, end.x, end.y);
                
                ctx.lineWidth = 5;
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.65)';
                ctx.lineCap = 'round';
                ctx.setLineDash([12, 10]);
                ctx.stroke();
                ctx.setLineDash([]);

                // Target Lock Visualizer
                ctx.beginPath();
                ctx.arc(end.x, end.y, 8, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#fff';
                ctx.stroke();
            }

            ctx.restore();
        }

        let lastTime = 0;
        function gameLoop(time) {
            let dt = time - lastTime;
            lastTime = time;
            if (dt > 100) dt = 100;
            
            update(dt, time);
            draw();
            
            requestAnimationFrame(gameLoop);
        }

        // --- Strategic Event Setup ---
        document.getElementById('hostBtn').addEventListener('click', createRoom);
        document.getElementById('joinBtn').addEventListener('click', () => {
            playSound('click');
            document.getElementById('joinSection').classList.toggle('hidden');
        });
        document.getElementById('confirmJoinBtn').addEventListener('click', joinRoom);
        document.getElementById('leaveLobbyBtn').addEventListener('click', leaveLobby);
        document.getElementById('startGameBtn').addEventListener('click', triggerStartGame);
        
        document.getElementById('recenterCameraBtn').addEventListener('click', () => {
            playSound('click');
            centerCamera();
        });
        document.getElementById('leaveGameBtn').addEventListener('click', () => {
            playSound('click');
            if (confirm("Disconnect and abandon this tactical combat?")) {
                leaveLobby();
                document.getElementById('gameHUD').classList.add('hidden');
            }
        });
        document.getElementById('backToMenuBtn').addEventListener('click', () => {
            playSound('click');
            document.getElementById('endGameScreen').classList.replace('flex', 'hidden');
            document.getElementById('mainMenu').classList.remove('hidden');
            leaveLobby();
        });

        // Copy Room Code Helper
        document.getElementById('copyCodeBtn').addEventListener('click', () => {
            if (roomCode) {
                document.execCommand('copy');
                // Temporary visual notification
                const origText = document.getElementById('roomCodeDisplay').innerText;
                document.getElementById('roomCodeDisplay').innerText = "COPIED!";
                setTimeout(() => {
                    document.getElementById('roomCodeDisplay').innerText = origText;
                }, 1000);
            }
        });

        // Start animation loop once loaded
        window.onload = function() {
            requestAnimationFrame(gameLoop);
        };
    </script>
</body>
</html>
