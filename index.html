<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050816" />
  <title>KOYREACH STORE Authenticator</title>
  <style>
    :root {
      --bg: #050816;
      --card: rgba(255, 255, 255, 0.085);
      --card-strong: rgba(255, 255, 255, 0.14);
      --stroke: rgba(255, 255, 255, 0.16);
      --stroke-soft: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.68);
      --blue: #38bdf8;
      --violet: #a78bfa;
      --green: #34d399;
      --red: #fb7185;
      --shadow: rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 50% -10%, rgba(56, 189, 248, 0.34), transparent 34%),
        radial-gradient(circle at 100% 20%, rgba(167, 139, 250, 0.32), transparent 28%),
        radial-gradient(circle at 0% 95%, rgba(52, 211, 153, 0.14), transparent 28%),
        linear-gradient(145deg, #050816 0%, #0b1025 48%, #050816 100%);
      overflow: hidden;
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.38;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black, transparent 74%);
    }

    .shell {
      width: min(430px, 100%);
      position: relative;
    }

    .glow {
      position: absolute;
      inset: 24px;
      border-radius: 38px;
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.32), rgba(167, 139, 250, 0.26));
      filter: blur(44px);
      opacity: 0.7;
      transform: translateY(18px);
    }

    .card {
      position: relative;
      overflow: hidden;
      width: 100%;
      border: 1px solid var(--stroke);
      border-radius: 38px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.06));
      box-shadow: 0 32px 90px var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(26px);
      padding: 24px;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 30% 0%, rgba(255, 255, 255, 0.18), transparent 34%),
        linear-gradient(135deg, rgba(56, 189, 248, 0.16), transparent 46%);
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 18px;
      text-align: center;
    }

    .brand {
      display: inline-grid;
      place-items: center;
      justify-self: center;
      min-height: 48px;
      padding: 0 18px;
      border: 1px solid var(--stroke-soft);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.14);
    }

    .code-panel {
      margin-top: 4px;
      position: relative;
      min-height: 142px;
      display: grid;
      place-items: center;
      border-radius: 32px;
      border: 1px solid var(--stroke-soft);
      background:
        linear-gradient(180deg, rgba(5, 8, 22, 0.66), rgba(5, 8, 22, 0.46)),
        radial-gradient(circle at center, rgba(56, 189, 248, 0.14), transparent 60%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 18px 42px rgba(0, 0, 0, 0.22);
    }

    .code-panel::after {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      pointer-events: none;
    }

    .code {
      position: relative;
      z-index: 1;
      margin-left: 0.08em;
      font-size: clamp(54px, 16vw, 82px);
      font-weight: 950;
      letter-spacing: 0.085em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 36px rgba(56, 189, 248, 0.34);
      user-select: all;
    }

    .meta-row {
      display: grid;
      grid-template-columns: 132px 1fr;
      gap: 14px;
      align-items: stretch;
    }

    .timer-card,
    .status-card {
      border: 1px solid var(--stroke-soft);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.075);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .timer-card {
      min-height: 132px;
      display: grid;
      place-items: center;
    }

    .timer-ring {
      width: 94px;
      height: 94px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: conic-gradient(var(--blue) calc(var(--progress, 0) * 1%), rgba(255,255,255,0.12) 0);
      box-shadow: 0 0 34px rgba(56, 189, 248, 0.16);
      transition: background 0.2s linear;
    }

    .timer-inner {
      width: 76px;
      height: 76px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: rgba(5, 8, 22, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .countdown {
      font-size: 32px;
      font-weight: 950;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .status-card {
      min-height: 132px;
      padding: 18px;
      display: grid;
      align-content: center;
      gap: 8px;
      text-align: left;
    }

    .product-card {
      text-align: center;
      align-content: center;
      justify-content: center;
    }

    .product-name {
      font-size: clamp(24px, 7vw, 34px);
      font-weight: 950;
      line-height: 1.05;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ffffff, #67e8f9, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 34px rgba(56, 189, 248, 0.18);
    }

    .copy {
      width: 100%;
      min-height: 64px;
      border: 0;
      border-radius: 24px;
      cursor: pointer;
      color: #03101f;
      background: linear-gradient(135deg, #67e8f9 0%, #38bdf8 44%, #a78bfa 100%);
      font-size: 20px;
      font-weight: 950;
      letter-spacing: 0.02em;
      box-shadow: 0 20px 44px rgba(56, 189, 248, 0.26), inset 0 1px 0 rgba(255, 255, 255, 0.4);
      transition: transform 0.16s ease, filter 0.16s ease, box-shadow 0.16s ease;
    }

    .copy:hover {
      transform: translateY(-2px);
      filter: brightness(1.06);
      box-shadow: 0 24px 54px rgba(56, 189, 248, 0.32), inset 0 1px 0 rgba(255, 255, 255, 0.46);
    }

    .copy:active {
      transform: translateY(1px) scale(0.99);
    }

    .copy.done {
      background: linear-gradient(135deg, var(--green), #bbf7d0);
    }

    .copy.error {
      background: linear-gradient(135deg, var(--red), #fecdd3);
    }

    @media (max-width: 420px) {
      .card {
        padding: 18px;
        border-radius: 32px;
      }

      .brand {
        width: 100%;
        font-size: 16px;
      }

      .code-panel {
        min-height: 126px;
        border-radius: 28px;
      }

      .meta-row {
        grid-template-columns: 1fr;
      }

      .timer-card,
      .status-card {
        min-height: auto;
      }

      .timer-card {
        padding: 16px;
      }

      .status-card {
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="noise"></div>

  <main class="shell" aria-label="KOYREACH STORE authenticator">
    <div class="glow"></div>

    <section class="card">
      <div class="content">
        <div class="brand">KOYREACH STORE</div>

        <div class="code-panel">
          <div id="code" class="code" aria-live="polite">------</div>
        </div>

        <div class="meta-row">
          <div class="timer-card" aria-label="Countdown">
            <div id="timerRing" class="timer-ring" style="--progress: 0;">
              <div class="timer-inner">
                <div id="countdown" class="countdown">30</div>
              </div>
            </div>
          </div>

          <div class="status-card product-card">
            <div class="product-name">GEMINI PRO 4M</div>
          </div>
        </div>

        <button id="copyBtn" class="copy" type="button">Copy Code</button>
      </div>
    </section>
  </main>

  <script>
    const SECRET = "2xfc jnye 3bhq bsuo wyeo advm khu4 25kt";
    const PERIOD = 30;
    const DIGITS = 6;

    const codeEl = document.getElementById("code");
    const countdownEl = document.getElementById("countdown");
    const timerRing = document.getElementById("timerRing");
    const copyBtn = document.getElementById("copyBtn");

    let currentCode = "";
    let lastCounter = null;

    function normalizeBase32(value) {
      return value.toUpperCase().replace(/[^A-Z2-7]/g, "");
    }

    function base32ToBytes(base32) {
      const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
      let bits = "";
      const bytes = [];

      for (const char of normalizeBase32(base32)) {
        const value = alphabet.indexOf(char);
        if (value === -1) continue;
        bits += value.toString(2).padStart(5, "0");
      }

      for (let i = 0; i + 8 <= bits.length; i += 8) {
        bytes.push(parseInt(bits.slice(i, i + 8), 2));
      }

      return new Uint8Array(bytes);
    }

    function counterToBytes(counter) {
      const buffer = new ArrayBuffer(8);
      const view = new DataView(buffer);
      const high = Math.floor(counter / 0x100000000);
      const low = counter >>> 0;
      view.setUint32(0, high, false);
      view.setUint32(4, low, false);
      return buffer;
    }

    async function generateTotp(secret, counter) {
      const keyBytes = base32ToBytes(secret);
      const cryptoKey = await crypto.subtle.importKey(
        "raw",
        keyBytes,
        { name: "HMAC", hash: "SHA-1" },
        false,
        ["sign"]
      );

      const signature = await crypto.subtle.sign("HMAC", cryptoKey, counterToBytes(counter));
      const hmac = new Uint8Array(signature);
      const offset = hmac[hmac.length - 1] & 0x0f;

      const binary =
        ((hmac[offset] & 0x7f) << 24) |
        ((hmac[offset + 1] & 0xff) << 16) |
        ((hmac[offset + 2] & 0xff) << 8) |
        (hmac[offset + 3] & 0xff);

      return String(binary % 10 ** DIGITS).padStart(DIGITS, "0");
    }

    async function updateCode() {
      const now = Math.floor(Date.now() / 1000);
      const counter = Math.floor(now / PERIOD);
      const remaining = PERIOD - (now % PERIOD);
      const progress = (remaining / PERIOD) * 100;

      countdownEl.textContent = remaining;
      timerRing.style.setProperty("--progress", progress);

      if (counter !== lastCounter) {
        lastCounter = counter;
        currentCode = await generateTotp(SECRET, counter);
        codeEl.textContent = currentCode;
      }
    }

    async function copyCode() {
      try {
        await navigator.clipboard.writeText(currentCode);
        setButtonState("Copied", "done");
      } catch {
        const temp = document.createElement("textarea");
        temp.value = currentCode;
        temp.style.position = "fixed";
        temp.style.opacity = "0";
        document.body.appendChild(temp);
        temp.focus();
        temp.select();

        try {
          document.execCommand("copy");
          setButtonState("Copied", "done");
        } catch {
          setButtonState("Copy Failed", "error");
        }

        document.body.removeChild(temp);
      }
    }

    function setButtonState(text, className) {
      copyBtn.textContent = text;
      copyBtn.classList.remove("done", "error");
      copyBtn.classList.add(className);

      setTimeout(() => {
        copyBtn.textContent = "Copy Code";
        copyBtn.classList.remove("done", "error");
      }, 1100);
    }

    copyBtn.addEventListener("click", copyCode);

    updateCode();
    setInterval(updateCode, 250);
  </script>
</body>
</html>
